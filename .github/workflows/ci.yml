name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Audit
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          DATABASE_SSL: 'false'

  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: toolbox_test
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d toolbox_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Upgrade npm
        run: npm install -g npm@11

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run migrations
        run: npx tsx db/migrate.ts
        env:
          DATABASE_URL: postgresql://testuser:testpassword@localhost:5433/toolbox_test

      - name: Seed test data
        run: npm run test:e2e:seed
        env:
          E2E_DATABASE_URL: postgresql://testuser:testpassword@localhost:5433/toolbox_test

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          DATABASE_SSL: 'false'
          E2E_DATABASE_URL: postgresql://testuser:testpassword@localhost:5433/toolbox_test

      - name: Upload test results
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
